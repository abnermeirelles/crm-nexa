name: pr-validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_ADMIN_URL: postgresql://placeholder@localhost:5432/placeholder
        run: pnpm -F @crm-nexa/database exec prisma generate

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint

      - name: Build
        run: pnpm turbo run build
